name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore VulcansTrace.sln

      - name: Build
        run: dotnet build VulcansTrace.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test VulcansTrace.Tests\VulcansTrace.Tests.csproj --no-build --configuration Release --verbosity normal
